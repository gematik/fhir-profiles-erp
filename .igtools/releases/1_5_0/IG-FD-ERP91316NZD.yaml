text: Der E-Rezept-Fachdienst MUSS bei der Überprüfung der Ressourcen-IDs, wenn eine
  Auffälligkeit auftritt und die Konfiguration "Fehler" aktiv ist, mit dem HTTP-Fehlercode
  400 abbrechen und die Fehlermeldung "Die ID einer Ressource und die ID der zugehörigen
  fullUrl stimmen nicht überein." in Form eines OperationOutcome ausliefern.
