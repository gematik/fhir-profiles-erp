text: "Der E-Rezept-Fachdienst MUSS bei der Überprüfung der Ressourcen-IDs, wenn eine\
  \ Auffälligkeit auftritt und die Konfiguration \"Warnung\" aktiv ist, mit der Abarbeitung\
  \ der Operation fortfahren und bei fehlerfreier Abarbeitung mit dem Http-Responsecode\
  \ 253 antworten und den Response für die Auffälligkeit mit einem Http-Header \"\
  Warning\" mit\n\n   warning-code: 253\n   warning-agent: \"erp-server\"\n   warning-text:\
  \ \"Die ID einer Ressource und die ID ihrer zugehörigen fullUrl stimmen nicht überein.\"\
  \n   versehen."
title: FHIR-Ressource validieren - Prüfung Ressource-IDs - Konfiguration Warnung
