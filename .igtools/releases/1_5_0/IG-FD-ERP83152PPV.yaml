text: Der E-Rezept-Fachdienst MUSS die Funktion <code>GET [base]/metadata</code> implementieren.
  Diese Funktionalität stellt sicher, dass bei einem Aufruf von <code>/metadata</code>
  das FHIR CapabilityStatement des Servers zurückgegeben wird. Dieses Capability Statement
  bietet eine detaillierte Beschreibung der Fähigkeiten des E-Rezept-Fachdienstes
  und ist entscheidend für das Verständnis der unterstützten FHIR-Funktionalitäten.
title: Implementierung der /metadata Funktion im E-Rezept-Fachdienst
